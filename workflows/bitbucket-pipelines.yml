# Socket Security Bitbucket Pipelines
# This pipeline runs Socket Security scans on every commit to any branch
# and posts PR comments when run against a pull request.

image: socketdev/cli:latest

definitions:
  steps:
    - step: &socket-scan
        name: Socket Security Scan
        script:
          # Run Socket CLI with --scm bitbucket to enable PR comments.
          # The CLI automatically detects repo, branch, commit, etc. from
          # BITBUCKET_* env vars exposed by Pipelines.
          - |
            socketcli \
              --target-path $BITBUCKET_CLONE_DIR \
              --scm bitbucket \
              --integration bitbucket \
              --pr-number ${BITBUCKET_PR_ID:-0}
        # Repository variables needed (set in Bitbucket repo settings):
        # SOCKET_SECURITY_API_KEY:   Your Socket Security API token
        # BITBUCKET_TOKEN:           A Repository or Workspace access token with
        #                            "Pull requests: Write" scope
        #                            (or set BITBUCKET_USERNAME and
        #                             BITBUCKET_APP_PASSWORD for an app password)
        # BITBUCKET_DEFAULT_BRANCH:  Optional. Bitbucket Pipelines does not
        #                            export the repo's default branch, so set
        #                            this (e.g. "main") for accurate default-
        #                            branch detection. You can also pass
        #                            --default-branch on the CLI directly.
        # Without either credential set, --scm bitbucket exits 2.

pipelines:
  # Run on all branches
  branches:
    '**':
      - step: *socket-scan
  
  # Run on pull requests
  pull-requests:
    '**':
      - step: *socket-scan

# Optional: More efficient version that only runs when manifest files change
# To use this instead, replace the pipelines section above with:
#
# pipelines:
#   branches:
#     '**':
#       - step:
#           <<: *socket-scan
#           condition:
#             changesets:
#               includePaths:
#                 - "package.json"
#                 - "package-lock.json"
#                 - "yarn.lock"
#                 - "pnpm-lock.yaml"
#                 - "requirements.txt"
#                 - "Pipfile"
#                 - "Pipfile.lock"
#                 - "pyproject.toml"
#                 - "poetry.lock"
#                 - "go.mod"
#                 - "go.sum"
#                 - "Cargo.toml"
#                 - "Cargo.lock"
#                 - "composer.json"
#                 - "composer.lock"
#                 - "Gemfile"
#                 - "Gemfile.lock"
#                 - "**/*.csproj"
#                 - "**/*.fsproj"
#                 - "**/*.vbproj"
#                 - "packages.config"
#                 - "paket.dependencies"
#                 - "project.json"
#   
#   pull-requests:
#     '**':
#       - step: *socket-scan

# Note: --scm bitbucket enables PR comments via the Bitbucket Cloud REST
# API. Generate a token at the workspace or repository level with at least
# the "Pull requests: Write" scope and expose it as BITBUCKET_TOKEN. For
# Bitbucket Server / Data Center, set BITBUCKET_API_URL to your server's
# REST API base URL.
