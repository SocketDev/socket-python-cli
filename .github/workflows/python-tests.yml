name: Python Tests

env:
  PYTHON_VERSION: "3.12"

on:
  push:
    branches: [main]
    paths:
      - "socketsecurity/**/*.py"
      - "tests/unit/**/*.py"
      - "tests/core/**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/*.yml"
  pull_request:
    paths:
      - "socketsecurity/**/*.py"
      - "tests/unit/**/*.py"
      - "tests/core/**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/*.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --extra dev
      - name: Ruff
        run: uv run ruff check .

  python-tests:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: 🐍 setup python
        uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: 🛠️ install deps
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --extra test
      - name: 🧪 run tests
        run: uv run pytest -q tests/unit/ tests/core/

  sdk-latest-compat:
    name: SDK Latest Compat
    needs: lint
    uses: ./.github/workflows/reusable-cli-compat.yml
    with:
      python_version: "3.12"
      sdk_source: "pypi"

  unsupported-python-install:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: 🐍 setup python
        uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3
        with:
          python-version: "3.10"
      - name: 🚫 verify install is rejected on unsupported python
        run: |
          python -m pip install --upgrade pip
          if pip install .; then
            echo "Expected pip install . to fail on Python 3.10"
            exit 1
          fi
