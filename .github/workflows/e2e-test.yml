name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    # Skip e2e on:
    #  - PRs from forks (no secrets)
    #  - Dependabot PRs (no secrets, and dependency-bump risk is already
    #    covered by dependabot-review.yml's Socket Firewall smoke jobs)
    if: >-
      (github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository) &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: scan
            args: >-
              --target-path tests/e2e/fixtures/simple-npm
              --disable-blocking
              --enable-debug
            validate: tests/e2e/validate-scan.sh

          - name: sarif
            args: >-
              --target-path tests/e2e/fixtures/simple-npm
              --sarif-file /tmp/results.sarif
              --disable-blocking
            validate: tests/e2e/validate-sarif.sh

          - name: reachability
            args: >-
              --target-path tests/e2e/fixtures/simple-npm
              --reach
              --disable-blocking
              --enable-debug
            validate: tests/e2e/validate-reachability.sh
            setup-node: "true"

          - name: gitlab
            args: >-
              --target-path tests/e2e/fixtures/simple-npm
              --enable-gitlab-security
              --disable-blocking
            validate: tests/e2e/validate-gitlab.sh

          - name: json
            args: >-
              --target-path tests/e2e/fixtures/simple-npm
              --enable-json
              --disable-blocking
            validate: tests/e2e/validate-json.sh

          - name: pypi
            args: >-
              --target-path tests/e2e/fixtures/simple-pypi
              --disable-blocking
              --enable-debug
            validate: tests/e2e/validate-scan.sh

    name: e2e-${{ matrix.name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: matrix.setup-node == 'true'
        with:
          node-version: '20'

      - name: Install CLI from local repo
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Install uv
        if: matrix.setup-node == 'true'
        run: pip install uv

      - name: Run Socket CLI
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_CLI_API_TOKEN }}
        run: |
          set -o pipefail
          socketcli ${{ matrix.args }} 2>&1 | tee /tmp/e2e-output.log

      - name: Validate results
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_CLI_API_TOKEN }}
        run: bash ${{ matrix.validate }}
